name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: darwin,win32,linux or "all")'
        required: false
        type: string
        default: 'all'
      force_rebuild:
        description: 'Force rebuild even if artifact exists in S3'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Determine what to build
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      is_tag: ${{ steps.check.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate backend import boundary
        run: bash scripts/check-main-backend-boundary.sh

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version packages/shared/package.json)

          # Validate semver format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # Require release notes file to exist before proceeding with release.
      # This replaces AI-generated changelogs - release notes must be written manually.
      - name: Validate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="apps/electron/resources/release-notes/${VERSION}.md"

          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Missing release notes: $NOTES_FILE"
            echo ""
            echo "❌ Release notes file not found!"
            echo ""
            echo "Before releasing v${VERSION}, create the file:"
            echo "  $NOTES_FILE"
            echo ""
            echo "Example content:"
            echo "  ## Features"
            echo "  - New feature description"
            echo ""
            echo "  ## Improvements"
            echo "  - Improvement description"
            echo ""
            echo "  ## Bug Fixes"
            echo "  - Fix description"
            exit 1
          fi

          echo "✓ Found release notes: $NOTES_FILE"

      - name: Check trigger type
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        run: |
          PLATFORMS="${{ inputs.platforms || 'all' }}"

          # For tag triggers, always build all platforms
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            PLATFORMS="all"
          fi

          MATRIX='{"include":['
          FIRST=true

          # macOS arm64
          if [[ "$PLATFORMS" == "all" || "$PLATFORMS" == *"darwin"* ]]; then
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX+=','; fi
            MATRIX+='{"os":"macos-14","platform":"darwin","arch":"arm64","ext":"dmg"}'
            MATRIX+=','
            MATRIX+='{"os":"macos-15-intel","platform":"darwin","arch":"x64","ext":"dmg"}'
          fi

          # Windows
          if [[ "$PLATFORMS" == "all" || "$PLATFORMS" == *"win32"* ]]; then
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX+=','; fi
            MATRIX+='{"os":"windows-latest","platform":"win32","arch":"x64","ext":"exe"}'
          fi

          # Linux
          if [[ "$PLATFORMS" == "all" || "$PLATFORMS" == *"linux"* ]]; then
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX+=','; fi
            MATRIX+='{"os":"ubuntu-latest","platform":"linux","arch":"x64","ext":"AppImage"}'
          fi

          MATRIX+=']}'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  # Build for each platform in parallel
  build:
    needs: prepare
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if artifact exists
        id: check
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="Craft-Agent-${{ matrix.arch }}.${{ matrix.ext }}"
          URL="https://agents.craft.do/electron/${VERSION}/${ARTIFACT}"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --head --connect-timeout 10 "$URL" || echo "000")

          if [ "$HTTP_STATUS" = "200" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download existing artifact
        if: steps.check.outputs.skip == 'true'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="Craft-Agent-${{ matrix.arch }}.${{ matrix.ext }}"
          URL="https://agents.craft.do/electron/${VERSION}/${ARTIFACT}"

          mkdir -p apps/electron/release
          curl -fsSL "$URL" -o "apps/electron/release/${ARTIFACT}"

          # Also download .zip if it exists (macOS builds produce .zip for electron-updater)
          ZIP_ARTIFACT="Craft-Agent-${{ matrix.arch }}.zip"
          ZIP_URL="https://agents.craft.do/electron/${VERSION}/${ZIP_ARTIFACT}"
          curl -fsSL "$ZIP_URL" -o "apps/electron/release/${ZIP_ARTIFACT}" || true

      - name: Setup Bun
        if: steps.check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          # v2: Windows now uses --linker=hoisted (flat node_modules, no .bun)
          key: ${{ runner.os }}-bun-v2-${{ hashFiles('bun.lock') }}

      - name: Install dependencies (Unix)
        if: steps.check.outputs.skip != 'true' && matrix.platform != 'win32'
        run: bun install

      - name: Install dependencies (Windows)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'win32'
        run: bun install --linker=hoisted

      # macOS code signing
      - name: Import Code Signing Certificate (macOS)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'darwin' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm "$CERT_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Build using unified build script
      - name: Build (macOS)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'darwin'
        run: bun run scripts/build.ts --platform=darwin --arch=${{ matrix.arch }}
        env:
          # Note: Google OAuth credentials not included - users provide their own via source config
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Configure Defender exclusions (Windows)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'win32'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "bun.exe" -ErrorAction SilentlyContinue

      - name: Build (Windows)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'win32'
        run: bun run scripts/build.ts --platform=win32 --arch=${{ matrix.arch }}
        env:
          # Note: Google OAuth credentials not included - users provide their own via source config
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}

      # Windows code signing with Azure Key Vault
      - name: Sign Windows executable
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'win32' && env.AZURE_CERT_KVU != ''
        env:
          AZURE_CERT_KVU: ${{ secrets.AZURE_CERT_KVU }}
          AZURE_CERT_KVC: ${{ secrets.AZURE_CERT_KVC }}
          AZURE_CERT_KVI: ${{ secrets.AZURE_CERT_KVI }}
          AZURE_CERT_KVS: ${{ secrets.AZURE_CERT_KVS }}
          AZURE_CERT_KVT: ${{ secrets.AZURE_CERT_KVT }}
        shell: powershell
        run: |
          dotnet tool install --global AzureSignTool
          $ExePath = Get-ChildItem -Path "apps/electron/release" -Filter "*.exe" | Select-Object -First 1
          AzureSignTool sign `
            --azure-key-vault-url "$env:AZURE_CERT_KVU" `
            --azure-key-vault-client-id "$env:AZURE_CERT_KVI" `
            --azure-key-vault-client-secret "$env:AZURE_CERT_KVS" `
            --azure-key-vault-tenant-id "$env:AZURE_CERT_KVT" `
            --azure-key-vault-certificate "$env:AZURE_CERT_KVC" `
            --timestamp-rfc3161 "http://timestamp.digicert.com" `
            --file-digest sha256 `
            "$($ExePath.FullName)"

      - name: Build (Linux)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'linux'
        run: bun run scripts/build.ts --platform=linux --arch=${{ matrix.arch }}
        env:
          # Note: Google OAuth credentials not included - users provide their own via source config
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          # Include both installer (.dmg/.exe/.AppImage) and .zip (used by electron-updater for macOS auto-updates).
          # The .zip only exists for macOS builds; upload-artifact silently ignores missing paths.
          path: |
            apps/electron/release/Craft-Agent-${{ matrix.arch }}.${{ matrix.ext }}
            apps/electron/release/Craft-Agent-${{ matrix.arch }}.zip
          retention-days: 7

  # Verify SDK is bundled in all artifacts before upload
  verify-bundles:
    name: Verify SDK Bundling
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: artifacts
          merge-multiple: false

      - name: Verify macOS ARM64
        run: |
          cd artifacts/build-darwin-arm64
          unzip -q Craft-Agent-arm64.zip -d verify
          APP="verify/Craft Agents.app/Contents/Resources/app"
          SDK="$APP/node_modules/@anthropic-ai/claude-agent-sdk/cli.js"
          if [ ! -f "$SDK" ]; then
            echo "::error::SDK missing in macOS ARM64 bundle"
            ls -la "$APP/" || true
            ls -la "$APP/node_modules/" || true
            exit 1
          fi
          SIZE=$(stat -c%s "$SDK")
          echo "✓ macOS ARM64: SDK found ($SIZE bytes)"

      - name: Verify macOS x64
        run: |
          cd artifacts/build-darwin-x64
          unzip -q Craft-Agent-x64.zip -d verify
          APP="verify/Craft Agents.app/Contents/Resources/app"
          SDK="$APP/node_modules/@anthropic-ai/claude-agent-sdk/cli.js"
          if [ ! -f "$SDK" ]; then
            echo "::error::SDK missing in macOS x64 bundle"
            exit 1
          fi
          SIZE=$(stat -c%s "$SDK")
          echo "✓ macOS x64: SDK found ($SIZE bytes)"

      - name: Verify Linux
        run: |
          cd artifacts/build-linux-x64
          chmod +x Craft-Agent-x64.AppImage
          ./Craft-Agent-x64.AppImage --appimage-extract >/dev/null 2>&1
          APP="squashfs-root/resources/app"
          SDK="$APP/node_modules/@anthropic-ai/claude-agent-sdk/cli.js"
          if [ ! -f "$SDK" ]; then
            echo "::error::SDK missing in Linux bundle"
            exit 1
          fi
          SIZE=$(stat -c%s "$SDK")
          echo "✓ Linux: SDK found ($SIZE bytes)"

      - name: Verify Windows
        run: |
          cd artifacts/build-win32-x64
          sudo apt-get install -qq p7zip-full
          7z x -y Craft-Agent-x64.exe -oextracted >/dev/null
          NSIS="extracted/\$PLUGINSDIR/app-64.7z"
          if [ -f "$NSIS" ]; then
            7z x -y "$NSIS" -oapp >/dev/null
            APP="app/resources/app"
            SDK_PATH="$APP/node_modules/@anthropic-ai/claude-agent-sdk/cli.js"
            if [ ! -f "$SDK_PATH" ]; then
              echo "::error::SDK missing in Windows bundle"
              exit 1
            fi
            SIZE=$(stat -c%s "$SDK_PATH")
            echo "✓ Windows: SDK found ($SIZE bytes)"
          else
            echo "::error::Windows: Could not extract installer for verification"
            exit 1
          fi

  # Upload to S3 and create GitHub release
  upload:
    needs: [prepare, build, verify-bundles]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: apps/electron/release
          pattern: build-*
          merge-multiple: true

      # Upload to versioned path only (electron/{version}/).
      # Promotion to electron/latest/ happens separately via the promote workflow,
      # allowing testing before propagating to all users.
      - name: Upload to S3
        env:
          S3_VERSIONS_BUCKET_ENDPOINT: ${{ secrets.S3_VERSIONS_BUCKET_ENDPOINT }}
          S3_VERSIONS_BUCKET_ACCESS_KEY_ID: ${{ secrets.S3_VERSIONS_BUCKET_ACCESS_KEY_ID }}
          S3_VERSIONS_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.S3_VERSIONS_BUCKET_SECRET_ACCESS_KEY }}
        run: bun run scripts/upload.ts

      - name: Create git tag (if not already a tag push)
        if: needs.prepare.outputs.is_tag != 'true' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="v${VERSION}"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag $TAG already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # OSS sync and promotion to latest are handled by the promote workflow
      # (.github/workflows/promote.yml) — triggered manually after testing.
      - name: Print summary
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo ""
          echo "=========================================="
          echo "  Build v$VERSION uploaded"
          echo "=========================================="
          echo ""
          echo "Artifacts available at:"
          echo "  https://agents.craft.do/electron/$VERSION/"
          echo ""
          echo "To promote to latest and release to OSS:"
          echo "  Run the 'Promote Release' workflow with version $VERSION"
