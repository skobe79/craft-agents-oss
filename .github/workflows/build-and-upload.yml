name: Build

on:
  workflow_dispatch:
    inputs:
      codex-version:
        description: 'Codex fork version to bundle (e.g., craft-v0.1.0). See: https://github.com/lukilabs/craft-agents-codex/releases'
        required: false
        type: string
        default: ''
      targets:
        description: 'Targets to build (comma-separated: macos-arm64, macos-x64, windows, linux, or "all")'
        required: false
        type: string
        default: 'all'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
      codex_version: ${{ steps.version.outputs.codex_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version packages/shared/package.json)
          CODEX_VERSION_FILE=$(jq -r .codexVersion packages/shared/package.json)
          INPUT_CODEX_VERSION="${{ inputs.codex-version }}"

          if [ -n "$INPUT_CODEX_VERSION" ]; then
            CODEX_VERSION="$INPUT_CODEX_VERSION"
          else
            CODEX_VERSION="$CODEX_VERSION_FILE"
          fi

          if [ -z "$CODEX_VERSION" ] || [ "$CODEX_VERSION" = "null" ]; then
            echo "::error::Missing codexVersion. Provide workflow input 'codex-version' or set packages/shared/package.json codexVersion."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "codex_version=$CODEX_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
          echo "Codex version: $CODEX_VERSION"

      - name: Build matrix
        id: matrix
        run: |
          TARGETS="${{ inputs.targets || 'all' }}"
          MATRIX='{"include":['
          FIRST=true

          add_target() {
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX+=','; fi
            MATRIX+="$1"
          }

          if [[ "$TARGETS" == "all" || "$TARGETS" == *"macos-arm64"* ]]; then
            add_target '{"os":"macos-14","platform":"darwin","arch":"arm64","ext":"dmg"}'
          fi

          if [[ "$TARGETS" == "all" || "$TARGETS" == *"macos-x64"* ]]; then
            add_target '{"os":"macos-15-intel","platform":"darwin","arch":"x64","ext":"dmg"}'
          fi

          if [[ "$TARGETS" == "all" || "$TARGETS" == *"windows"* ]]; then
            add_target '{"os":"windows-2019","platform":"win32","arch":"x64","ext":"exe"}'
          fi

          if [[ "$TARGETS" == "all" || "$TARGETS" == *"linux"* ]]; then
            add_target '{"os":"ubuntu-latest","platform":"linux","arch":"x64","ext":"AppImage"}'
          fi

          MATRIX+=']}'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Targets: $TARGETS"
          echo "Matrix: $MATRIX"

  build:
    needs: prepare
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      CODEX_VERSION: ${{ needs.prepare.outputs.codex_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install

      # macOS code signing
      - name: Import Code Signing Certificate (macOS)
        if: matrix.platform == 'darwin' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm "$CERT_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build (macOS)
        if: matrix.platform == 'darwin'
        run: bun run scripts/build.ts --codex-version=${{ env.CODEX_VERSION }} --platform=darwin --arch=${{ matrix.arch }}
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          SENTRY_ELECTRON_INGEST_URL: ${{ secrets.SENTRY_ELECTRON_INGEST_URL }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Configure Defender exclusions (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "bun.exe" -ErrorAction SilentlyContinue

      - name: Build (Windows)
        if: matrix.platform == 'win32'
        run: bun run scripts/build.ts --codex-version=${{ env.CODEX_VERSION }} --platform=win32 --arch=${{ matrix.arch }}
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          SENTRY_ELECTRON_INGEST_URL: ${{ secrets.SENTRY_ELECTRON_INGEST_URL }}

      # Windows code signing
      - name: Sign Windows executable
        if: matrix.platform == 'win32' && env.AZURE_CERT_KVU != ''
        env:
          AZURE_CERT_KVU: ${{ secrets.AZURE_CERT_KVU }}
          AZURE_CERT_KVC: ${{ secrets.AZURE_CERT_KVC }}
          AZURE_CERT_KVI: ${{ secrets.AZURE_CERT_KVI }}
          AZURE_CERT_KVS: ${{ secrets.AZURE_CERT_KVS }}
          AZURE_CERT_KVT: ${{ secrets.AZURE_CERT_KVT }}
        shell: powershell
        run: |
          dotnet tool install --global AzureSignTool
          $ExePath = Get-ChildItem -Path "apps/electron/release" -Filter "*.exe" | Select-Object -First 1
          AzureSignTool sign `
            --azure-key-vault-url "$env:AZURE_CERT_KVU" `
            --azure-key-vault-client-id "$env:AZURE_CERT_KVI" `
            --azure-key-vault-client-secret "$env:AZURE_CERT_KVS" `
            --azure-key-vault-tenant-id "$env:AZURE_CERT_KVT" `
            --azure-key-vault-certificate "$env:AZURE_CERT_KVC" `
            --timestamp-rfc3161 "http://timestamp.digicert.com" `
            --file-digest sha256 `
            "$($ExePath.FullName)"

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: bun run scripts/build.ts --codex-version=${{ env.CODEX_VERSION }} --platform=linux --arch=${{ matrix.arch }}
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          SENTRY_ELECTRON_INGEST_URL: ${{ secrets.SENTRY_ELECTRON_INGEST_URL }}

      - name: Verify MCP helper servers exist
        run: |
          node -e "const fs=require('fs');const path=require('path');const root=process.cwd();const bridge=path.join(root,'apps','electron','resources','bridge-mcp-server','index.js');const session=path.join(root,'apps','electron','resources','session-mcp-server','index.js');if(!fs.existsSync(bridge)) {console.error('Missing bridge MCP server:', bridge); process.exit(1);} if(!fs.existsSync(session)) {console.error('Missing session MCP server:', session); process.exit(1);} console.log('MCP helper servers present');"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/electron/release/Craft-Agent-${{ matrix.arch }}.${{ matrix.ext }}
            apps/electron/release/Craft-Agent-${{ matrix.arch }}.zip
          retention-days: 7

  summary:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Print artifact links
        run: |
          echo ""
          echo "=========================================="
          echo "  Build v${{ needs.prepare.outputs.version }} complete"
          echo "  Codex: ${{ env.CODEX_VERSION }}"
          echo "=========================================="
          echo ""
          echo "Download artifacts from:"
          echo "  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
