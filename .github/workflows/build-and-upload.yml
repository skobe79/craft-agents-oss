name: Build and Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (leave empty to use APP_VERSION from code)'
        required: false
        type: string
      isLatest:
        description: 'Also upload to /latest folder'
        required: false
        type: boolean
        default: false
      uploadScript:
        description: 'Also upload install.sh to bucket root'
        required: false
        type: boolean
        default: false
      createRelease:
        description: 'Create a GitHub release with binaries'
        required: false
        type: boolean
        default: true
      buildElectron:
        description: 'Build and upload Electron desktop app (macOS DMG)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync versions
        run: bun run scripts/sync-version.ts

      - name: Build
        run: bun run scripts/build.ts ${{ inputs.version }}

      - name: Get version from manifest
        id: version
        run: echo "version=$(jq -r .version .build/upload/manifest.json)" >> $GITHUB_OUTPUT

      - name: Upload to S3
        env:
          S3_VERSIONS_BUCKET_ENDPOINT: ${{ secrets.S3_VERSIONS_BUCKET_ENDPOINT }}
          S3_VERSIONS_BUCKET_ACCESS_KEY_ID: ${{ secrets.S3_VERSIONS_BUCKET_ACCESS_KEY_ID }}
          S3_VERSIONS_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.S3_VERSIONS_BUCKET_SECRET_ACCESS_KEY }}
        run: |
          FLAGS=""
          if [ "${{ inputs.isLatest }}" = "true" ]; then
            FLAGS="$FLAGS --latest"
          fi
          if [ "${{ inputs.uploadScript }}" = "true" ]; then
            FLAGS="$FLAGS --script"
          fi
          bun run scripts/upload.ts $FLAGS

      - name: Create GitHub Release
        if: ${{ inputs.createRelease && !inputs.buildElectron }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release with auto-generated notes
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            .build/upload/*.tar.gz \
            .build/upload/manifest.json

  build-electron:
    if: ${{ inputs.buildElectron }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync versions
        run: bun run scripts/sync-version.ts

      - name: Build Electron app (arm64)
        run: bash apps/electron/scripts/build-dmg.sh arm64
        env:
          # OAuth credentials (baked into build)
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          MICROSOFT_OAUTH_CLIENT_SECRET: ${{ secrets.MICROSOFT_OAUTH_CLIENT_SECRET }}
          # Code signing (optional - set secrets for signed builds)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Build Electron app (x64)
        run: bash apps/electron/scripts/build-dmg.sh x64
        env:
          # OAuth credentials (baked into build)
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          MICROSOFT_OAUTH_CLIENT_SECRET: ${{ secrets.MICROSOFT_OAUTH_CLIENT_SECRET }}
          # Code signing
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Get version from app
        id: version
        run: |
          VERSION=$(grep -o 'APP_VERSION = "[^"]*"' packages/shared/src/version/app-version.ts | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Electron builds to S3
        env:
          S3_VERSIONS_BUCKET_ENDPOINT: ${{ secrets.S3_VERSIONS_BUCKET_ENDPOINT }}
          S3_VERSIONS_BUCKET_ACCESS_KEY_ID: ${{ secrets.S3_VERSIONS_BUCKET_ACCESS_KEY_ID }}
          S3_VERSIONS_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.S3_VERSIONS_BUCKET_SECRET_ACCESS_KEY }}
        run: |
          FLAGS="--electron"
          if [ "${{ inputs.isLatest }}" = "true" ]; then
            FLAGS="$FLAGS --latest"
          fi
          if [ "${{ inputs.uploadScript }}" = "true" ]; then
            FLAGS="$FLAGS --script"
          fi
          bun run scripts/upload.ts $FLAGS

      - name: Create GitHub Release with DMG
        if: ${{ inputs.createRelease }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Check if release already exists
          if gh release view "v${VERSION}" &>/dev/null; then
            # Upload DMG to existing release
            gh release upload "v${VERSION}" apps/electron/release/*.dmg --clobber
          else
            # Create new release with DMG
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              apps/electron/release/*.dmg
          fi
