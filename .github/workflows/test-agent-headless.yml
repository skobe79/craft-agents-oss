name: Test Craft Agent in headless mode

on:
  # Allow manual trigger with inputs
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to use (e.g., @my-agent)'
        required: false
        default: ''
        type: string
      test_prompt:
        description: 'Test prompt to execute'
        required: false
        default: 'dry-run: pls return what tools you have'
        type: string
      ws_mcp_url:
        description: 'MCP workspace URL'
        required: false
        default: ''
        type: string

jobs:
  test-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Install Craft CLI
        run: curl -fsSL https://agents.craft.do/cli/install.sh | bash

      - name: Run Test Agent
        timeout-minutes: 10
        env:
          CRAFT_ANTHROPIC_API_KEY: ${{ secrets.CRAFT_ANTHROPIC_API_KEY }}
          WS_MCP_URL: ${{ inputs.ws_mcp_url || secrets.TEST_DOCS_MCP_URL }}
          AGENT: ${{ inputs.agent }}
        run: |
          if [ -n "$AGENT" ]; then
            craft \
              -w "$WS_MCP_URL" \
              -a "$AGENT" \
              -p "${{ inputs.test_prompt }}" \
              --output-format stream-json \
              --debug
          else
            craft \
              -w "$WS_MCP_URL" \
              -p "${{ inputs.test_prompt }}" \
              --output-format stream-json \
              --debug
          fi

