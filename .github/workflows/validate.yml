name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Reject Windows-illegal filenames (with legal-archive exemption)
        run: |
          BAD=$(git ls-files \
            | grep -E '[<>:"|?*]' \
            | grep -v '^docs/project-evolution/' \
            || true)
          if [ -n "$BAD" ]; then
            echo "::error::New files with characters illegal on Windows:"
            echo "$BAD"
            echo "Note: docs/project-evolution/ is exempt (legal archive)."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run validation suite
        run: bun run validate:ci
