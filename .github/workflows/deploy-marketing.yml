name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'packages/ui/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build marketing site
        run: bun run marketing:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_MARKETING_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_MARKETING_PAGES_ACCOUNT_ID }}
          workingDirectory: apps/marketing
          command: pages deploy dist --project-name=craft-agents-marketing
