name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'packages/ui/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build marketing site
        run: bun run marketing:build

      - name: Deploy to Cloudflare Pages
        working-directory: apps/marketing
        run: bunx wrangler pages deploy dist --project-name=craft-agents-marketing --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_MARKETING_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_MARKETING_PAGES_ACCOUNT_ID }}
