name: Run Daily Team Discussion Points Agent

on:
  # Run Mon-Fri at 6am UTC
  schedule:
    - cron: '0 6 * * 1-5'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Install Craft CLI
        run: curl -fsSL https://agents.craft.do/install.sh | bash

      - name: Check installation
        run: |
          echo "=== Installed files ==="
          ls -la ~/.local/bin/
          ls -la ~/.local/share/craft/versions/ || echo "No versions dir"
          ls -laR ~/.local/share/craft/ || echo "No craft dir"
          echo "=== Node version ==="
          node --version || echo "Node not found"
          echo "=== PATH ==="
          echo $PATH

      - name: Run Daily Team Discussion Points Agent
        timeout-minutes: 10
        env:
          CRAFT_ANTHROPIC_API_KEY: ${{ secrets.CRAFT_ANTHROPIC_API_KEY }}
          DEBUG: "*"
        run: |
          craft \
            -w "${{ secrets.CRAFT_KB_MCP_URL }}" \
            -a "@daily-team-discussion-points" \
            -p "dry-run: don't create discussion points on any day, just try to find todays daily note and return if you succeeded" \
            --output-format stream-json \
            -m claude-opus-4-5-20251101 \
            --debug

      - name: Show craft debug log
        if: always()
        run: cat /tmp/craft-debug.log || echo "No craft debug log found"

