name: Run Daily Team Discussion Points Agent

on:
  # Run Mon-Fri at 6am UTC
  schedule:
    - cron: '0 5 * * 1-5'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Install Craft CLI
        run: curl -fsSL https://agents.craft.do/cli/install.sh | bash

      - name: Run Daily Team Discussion Points Agent
        timeout-minutes: 10
        env:
          CRAFT_ANTHROPIC_API_KEY: ${{ secrets.CRAFT_ANTHROPIC_API_KEY }}
        run: |
          craft \
            -w "${{ secrets.CRAFT_KB_MCP_URL }}" \
            -a "@daily-team-discussion-points" \
            -p "please do a run on today's daily note" \
            --output-format stream-json \
            -m claude-opus-4-5-20251101 \
            --debug

