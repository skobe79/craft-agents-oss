name: Run Daily Team Discussion Points Agent

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run discussion points agent
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bun run apps/cli/src/index.ts run \
            --workspace-dir .github/agents \
            --source craft-public \
            --send-timeout 540000 \
            --output-format stream-json \
            "[skill:daily-discussion] Run the skill on today's daily note"
