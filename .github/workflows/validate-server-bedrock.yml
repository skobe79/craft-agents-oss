name: Validate Server — Bedrock (Pi Agent)

on:
  workflow_dispatch:

jobs:
  validate-server-bedrock:
    runs-on: ubuntu-latest
    name: validate-server (bedrock, ubuntu)
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run --validate-server with Amazon Bedrock
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BEDROCK_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BEDROCK_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_BEDROCK_REGION }}
          STITCH_API_KEY: ${{ secrets.STITCH_API_KEY }}
        run: >-
          bun run apps/cli/src/index.ts
          --validate-server
          --provider amazon-bedrock
          --no-spinner
          --timeout 180000
          --workspace-dir .github/agents
