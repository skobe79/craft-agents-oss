appId: com.lukilabs.craft-agent
productName: Craft Agent
copyright: Copyright © 2025 Luki Labs

electronVersion: "39.2.7"

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - "!dist/renderer/src/**"
  - "!**/*.map"
  - package.json
  # Include SDK for subprocess execution
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  # Exclude SDK ripgrep binaries for other platforms (keep only current platform)
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/arm64-linux"
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-linux"
  - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-win32"
  # Include interceptor for cache TTL
  - packages/shared/src/cache-ttl-interceptor.ts
  # Include bundled Bun runtime
  - vendor/bun/**/*
  # Exclude everything else from node_modules
  - "!node_modules/**/*"
  - node_modules/@anthropic-ai/**/*

extraMetadata:
  main: dist/main.cjs

# Extra resources to bundle with the app (outside the app code)
extraResources:
  - from: scripts/self-update.sh
    to: self-update.sh

# Disable ASAR to avoid decompression overhead and click delays
asar: false

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Code signing & notarization (disabled by default for local builds)
  # To enable: set CSC_LINK, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # notarize:
  #   teamId: ${APPLE_TEAM_ID}

dmg:
  # Use predictable naming: Craft-Agent-arm64.dmg, Craft-Agent-x64.dmg
  artifactName: "Craft-Agent-${arch}.dmg"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Use predictable naming: Craft-Agent-x64.exe
  artifactName: "Craft-Agent-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true

linux:
  icon: resources/icon.png
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
  # Use predictable naming: Craft-Agent-x64.AppImage, Craft-Agent-arm64.AppImage
  artifactName: "Craft-Agent-${arch}.${ext}"
