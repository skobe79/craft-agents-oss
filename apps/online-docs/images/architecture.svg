<svg width="720" height="320" viewBox="0 0 720 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowStart" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 7 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowEnd" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Terminal Box -->
  <rect x="40" y="60" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" fill="#e5e7eb" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Your Terminal</text>
  <text x="120" y="115" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">CLI Interface</text>

  <!-- Craft Agents Box (center, purple) -->
  <rect x="280" y="60" width="160" height="80" rx="8" fill="#5D2CB2" stroke="#7C3AED" stroke-width="2"/>
  <text x="360" y="95" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Craft Agents</text>
  <text x="360" y="115" text-anchor="middle" fill="#DDD6FE" font-family="system-ui, -apple-system, sans-serif" font-size="11">Claude AI</text>

  <!-- Craft MCP Box -->
  <rect x="520" y="60" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" fill="#e5e7eb" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Craft MCP</text>
  <text x="600" y="115" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">Your Documents</text>

  <!-- External Services Box -->
  <rect x="280" y="200" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <text x="360" y="235" text-anchor="middle" fill="#e5e7eb" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">External Services</text>
  <text x="360" y="255" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">APIs, MCP Servers</text>

  <!-- Arrow: Terminal <-> Craft Agents -->
  <line x1="200" y1="100" x2="280" y2="100" stroke="#6b7280" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>

  <!-- Arrow: Craft Agents <-> Craft MCP -->
  <line x1="440" y1="100" x2="520" y2="100" stroke="#6b7280" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>

  <!-- Arrow: Craft Agents <-> External Services -->
  <line x1="360" y1="140" x2="360" y2="200" stroke="#6b7280" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
</svg>