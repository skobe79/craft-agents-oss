<svg width="720" height="200" viewBox="0 0 720 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowStart" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 7 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowEnd" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Chat Platforms Box -->
  <rect x="40" y="60" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <text x="110" y="92" text-anchor="middle" fill="#e5e7eb" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Chat Platforms</text>
  <text x="110" y="112" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">Slack, Telegram</text>
  <text x="110" y="127" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">Discord</text>

  <!-- Your Server Box -->
  <rect x="260" y="60" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <text x="330" y="92" text-anchor="middle" fill="#e5e7eb" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Your Server</text>
  <text x="330" y="112" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">Render / Railway</text>
  <text x="330" y="127" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="11">HTTP Wrapper</text>

  <!-- Craft Agents Box (purple) -->
  <rect x="480" y="60" width="140" height="80" rx="8" fill="#5D2CB2" stroke="#7C3AED" stroke-width="2"/>
  <text x="550" y="95" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Craft Agents</text>
  <text x="550" y="115" text-anchor="middle" fill="#DDD6FE" font-family="system-ui, -apple-system, sans-serif" font-size="11">CLI + Claude AI</text>

  <!-- Arrow: Chat Platforms <-> Your Server -->
  <line x1="180" y1="100" x2="260" y2="100" stroke="#6b7280" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="220" y="88" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="10">webhook</text>

  <!-- Arrow: Your Server -> Craft Agents -->
  <line x1="400" y1="100" x2="480" y2="100" stroke="#6b7280" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="440" y="88" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="10">CLI</text>
</svg>
